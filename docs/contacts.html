<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | ФТО</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Повторяем минимальные стили для примера -->
    <style>
        body { font-family: sans-serif; margin: 0; }
        header { background: #333; color: #fff; padding: 1rem 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        nav ul { list-style: none; padding: 0; display: flex; gap: 20px; }
        nav a { color: #fff; text-decoration: none; }
        .contact-section { padding: 40px 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<header>
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
        <div class="logo"><h1>ФТО</h1></div>
        <nav>
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="about.html">О нас</a></li>
                <li><a href="contacts.html">Контакты</a></li>
            </ul>
        </nav>
    </div>
</header>

<section class="contact-section container">
    <h2>Наши контакты</h2>
    <p><strong>Адрес:</strong> г. Нижний Новгород, ул. Тургенева, 9</p>
    <p><strong>Телефон:</strong> +7 (960) 178-67-38</p>
    <p><strong>Email:</strong> a20072005@yandex.ru</p>

    <div style="margin-top: 40px; max-width: 600px;">
        <h3>Напишите нам</h3>
        <form id="contact-form">
            <div class="form-group">
                <label>Имя</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Телефон</label>
                <input type="tel" name="phone" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Сообщение</label>
                <textarea name="message" rows="5" required></textarea>
            </div>
            <button type="submit">Отправить сообщение</button>
        </form>
    </div>
</section>

<!-- ПОДКЛЮЧЕНИЕ СКРИПТОВ -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/toast-module.js"></script>
<script src="js/cart-module.js"></script>
<script src="js/app.js"></script>

</body>
</html>
