<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог | ФТО</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Минимальные стили для модалки, если их нет в style.css -->
    <style>
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fefefe; margin: 10% auto; padding: 20px; border: 1px solid #888; width: 90%; max-width: 500px; border-radius: 8px; position: relative; }
        .close-modal { position: absolute; right: 15px; top: 10px; font-size: 28px; font-weight: bold; cursor: pointer; color: #aaa; }
        .close-modal:hover { color: #000; }
        /* Сетка каталога, если нет в style.css */
        #catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
        <div class="logo"><h1>ФТО | Каталог</h1></div>
        <nav>
            <ul style="display:flex; list-style:none; gap:20px; padding:0;">
                <li><a href="index.html">Главная</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="about.html">О нас</a></li>
                <li><a href="contacts.html">Контакты</a></li>
            </ul>
        </nav>
        <div class="cart-icon-wrap" data-toggle="cart-modal" href="#cart-modal" style="cursor:pointer;">
            🛒 Корзина <span class="cart-count" style="background:red; color:white; border-radius:50%; padding:2px 6px; font-size:12px; display:none;">0</span>
        </div>
    </div>
</header>

<main class="container" style="padding: 40px 20px;">
    <h2>Наше оборудование</h2>
    <!-- Сюда JS загрузит товары -->
    <div id="catalog-grid"></div>
</main>

<!-- Модальное окно корзины -->
<div id="cart-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2>Корзина</h2>
        <div id="cart-items-body"></div>
        <div style="margin-top: 20px; text-align: right; font-weight: bold; font-size: 1.2em;">
            Итого: <span id="cart-total-sum">0 ₽</span>
        </div>
        
        <form id="order-form" style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
            <h3>Оформление</h3>
            <input type="text" name="name" placeholder="Ваше имя" required style="width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box;">
            <input type="tel" name="phone" placeholder="Телефон" required style="width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box;">
            <textarea name="address" placeholder="Адрес доставки" style="width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box;"></textarea>
            <button type="submit" class="btn" id="checkout-btn" disabled style="width:100%; padding:10px; background:#28a745; color:white; border:none; cursor:pointer;">Подтвердить заказ</button>
        </form>
    </div>
</div>

<footer style="background:#333; color:#fff; padding:20px; text-align:center; margin-top:40px;">
    <p>© 2023 ФТО. г. Нижний Новгород</p>
</footer>

<!-- Подключение модулей -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/toast-module.js"></script>
<script src="js/cart-module.js"></script>
<script src="js/products-loader.js"></script>
<script src="js/app.js"></script>

</body>
</html>
