<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог | ФТО - Торговое оборудование</title>
    <meta name="description" content="Полный каталог торгового оборудования: стеллажи, витрины, кассы.">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Шапка подключается через header.js -->
    
    <!-- Заголовок страницы -->
    <section class="section" style="padding-top: 40px; padding-bottom: 20px;">
        <div class="container">
            <h1 class="section-title" style="margin-bottom: 16px;">Каталог оборудования</h1>
            <p style="text-align: center; color: var(--text-light); max-width: 600px; margin: 0 auto;">
                Выберите подходящее решение для вашего бизнеса
            </p>
        </div>
    </section>

    <!-- Фильтры (визуальные) -->
    <section class="section" style="padding-top: 0; padding-bottom: 20px;">
        <div class="container">
            <div style="display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
                <button class="btn" style="background: var(--primary); color: white;">Все товары</button>
                <button class="btn" style="background: var(--bg-secondary); color: var(--text);">Стеллажи</button>
                <button class="btn" style="background: var(--bg-secondary); color: var(--text);">Витрины</button>
                <button class="btn" style="background: var(--bg-secondary); color: var(--text);">Кассы</button>
                <button class="btn" style="background: var(--bg-secondary); color: var(--text);">Мебель</button>
            </div>
        </div>
    </section>

    <!-- Каталог (загружается через ProductsLoader) -->
    <main class="container" style="padding-bottom: 60px;">
        <div id="catalog-grid" class="catalog-grid">
            <p style="grid-column: 1/-1; text-align: center; color: var(--text-light);">
                Загрузка товаров...
            </p>
        </div>
    </main>

    <!-- =========================================
         МОДАЛЬНОЕ ОКНО КОРЗИНЫ (ЕДИНОЕ ДЛЯ ВСЕХ СТРАНИЦ)
         Важно: ID должен быть строго "cart-modal"
         ========================================= -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Ваша корзина</h2>
            <div id="cart-items"></div>
            <div class="cart-total">
                <span>Итого:</span>
                <span id="cart-total">0 ₽</span>
            </div>
            <form id="order-form" class="cart-form">
                <input type="text" id="name" name="name" placeholder="Ваше имя*" required autocomplete="name">
                <input type="tel" id="phone" name="phone" placeholder="Ваш телефон*" required autocomplete="tel">
                <textarea id="comment" name="address" placeholder="Адрес доставки (необязательно)" autocomplete="off"></textarea>
                <button type="submit" id="checkout-btn" disabled>Оформить заказ</button>
                <button type="button" class="btn secondary" onclick="document.getElementById('cart-modal').style.display='none'" style="margin-top: 10px; width: 100%;">Продолжить покупки</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container footer-content">
            <p><strong>Фабрика Торгового Оборудования</strong></p>
            <p>г. Нижний Новгород, ул. Тургенева, 9</p>
            <p>📞 +7 (960) 178-67-38 &nbsp;|&nbsp; ✉️ a20072005@yandex.ru</p>
            <div class="social-links">
                <a href="https://t.me/FTO_NN" class="social-link" target="_blank"><i class="fab fa-telegram"></i></a>
                <a href="https://vk.com/ooofto" class="social-link" target="_blank"><i class="fab fa-vk"></i></a>
            </div>
            <p style="margin-top: 24px; opacity: 0.7; font-size: 14px;">© 2026 ftoshop.ru. Все права защищены.</p>
        </div>
    </footer>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- Подключение скриптов (порядок важен!) -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/toast-module.js"></script>
    <script src="js/header.js"></script>
    <script src="js/cart-module.js"></script>
    <script src="js/products-loader.js"></script>
    <script src="js/app.js"></script>
    
    <!-- Инициализация каталога -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof ProductsLoader !== 'undefined') {
                ProductsLoader.loadProducts('#catalog-grid');
            }
        });
    </script>
</body>
</html>
