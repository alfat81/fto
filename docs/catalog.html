<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог | ФТО - Фабрика Торгового Оборудования</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Шапка (header.js) -->

    <!-- Главный баннер -->
    <section class="parallax-hero">
        <div class="container">
            <h2>Каталог продукции</h2>
            <p>Торговое оборудование для вашего бизнеса</p>
        </div>
    </section>

    <main class="page-content">
        <div class="container">
            <!-- Фильтры -->
            <div id="catalog-filters"></div>
            
            <!-- Сетка товаров -->
            <div class="products-grid" id="catalog-grid">
                <p style="text-align: center; padding: 40px;">Загрузка товаров...</p>
            </div>
        </div>
    </main>

    <!-- Подвал -->
    <footer class="site-footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <h3>ФТО</h3>
                    <p>Фабрика Торгового Оборудования</p>
                </div>
                <div class="footer-col">
                    <h3>Контакты</h3>
                    <p>+7 (960) 178-67-38</p>
                </div>
            </div>
            <div style="text-align: center; margin-top: 20px; color: #64748b;">&copy; 2026 ФТО</div>
        </div>
    </footer>

    <!-- ==========================================
         МОДАЛЬНОЕ ОКНО ТОВАРА (ЕДИНСТВЕННОЕ!)
         ========================================== -->
    <div id="product-modal" class="modal modal-product">
        <div class="modal-content">
            <span class="modal-close-btn" onclick="closeProductModal()">&times;</span>
            
            <!-- Левая часть: Фото -->
            <div class="modal-image-side">
                <img id="modal-img" src="" alt="Фото товара">
            </div>
            
            <!-- Правая часть: Информация -->
            <div class="modal-info-side">
                <h2 id="modal-title">Название товара</h2>
                <div id="modal-price-block" class="modal-price-block">0 ₽</div>
                <p id="modal-desc" class="modal-desc">Описание...</p>
                
                <!-- Таблица характеристик -->
                <table class="modal-specs-table" id="modal-specs"></table>
                
                <button id="modal-add-btn" class="btn-add-modal">
                    <i class="fas fa-cart-plus"></i> Добавить в корзину
                </button>
            </div>
        </div>
    </div>

    <!-- Модальное окно корзины -->
    <div id="cart-modal" class="modal">
        <div class="modal-content modal-cart">
            <span class="close-modal" onclick="CartModule.closeModal()">&times;</span>
            <h2>Корзина</h2>
            <div id="cart-items-container"></div>
            <div class="cart-total">Итого: <span id="cart-total-price">0 ₽</span></div>
        </div>
    </div>

    <!-- Скрипты -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="data/catalog-data.js"></script>
    <script src="js/cart-module.js"></script>
    <script src="js/products-loader.js"></script>
    <script src="js/app.js"></script>
    <script src="js/header.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            ProductsLoader.loadCatalog();
        });
    </script>
</body>
</html>
